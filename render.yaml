services:
  # Backend API (Minimal - without face recognition)
  - type: web
    name: forensync-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements_minimal.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    
  # Frontend Static Site  
  - type: web
    name: forensync-frontend
    runtime: static
    buildCommand: "cd frontend && npm ci && npm run build"
    staticPublishPath: ./frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: VITE_API_URL
        value: https://forensync-backend.onrender.com
