# ---------------------------------------------------------------------------
# Render deployment (PAID — see note).
#
# MEMORY: this app loads InsightFace + sentence-transformers and needs roughly
# 1.5-2.5 GB of RAM. Render's `free` and `starter` plans give 512 MB, so the
# service is OOM-killed on startup. The previous config here used `plan: free`
# AND requirements_minimal.txt (which has no face recognition), so it could
# never have worked. `standard` (2 GB) is the smallest plan that runs this.
#
# The Docker image serves the API *and* the React app on one port, so the
# separate static frontend service is no longer needed.
#
# WANT IT FREE? Use Hugging Face Spaces (Docker, 16 GB RAM, free) instead —
# see DEPLOYMENT.md. This file is only for a paid Render deploy.
# ---------------------------------------------------------------------------
services:
  - type: web
    name: forensync
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard          # 2 GB RAM. free/starter (512 MB) WILL crash.
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
