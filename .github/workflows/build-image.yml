name: Build and publish container image

# Azure student subscriptions block ACR Tasks (cloud builds), so the image is
# built here instead and published to GitHub Container Registry. Azure Container
# Apps then just pulls the finished image.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  workflow_dispatch:   # lets you re-run the build by hand from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # The AI image is several GB; the runner's default free space is tight.
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      # ghcr.io requires an all-lowercase image path; the repo owner is mixed case.
      - name: Compute image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Done
        run: |
          echo "Published: ${{ env.IMAGE }}:latest"
          echo "Make the package PUBLIC once, or Azure cannot pull it:"
          echo "https://github.com/${GITHUB_REPOSITORY}/pkgs/container/${GITHUB_REPOSITORY#*/}"
